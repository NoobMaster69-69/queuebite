<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueueBite — Kitchen</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0EB;--card:#FFFFFF;--dark:#1C0F06;--muted:#8A7060;
  --accent:#C85D14;--accent-light:#F5E8DC;--accent-dark:#9E4710;
  --green:#1E6E3A;--green-light:#E4F2EA;
  --red:#B52222;--red-light:#FCEAEA;
  --amber:#B07A10;--amber-light:#FEF3DC;
  --blue:#1A5CA8;--blue-light:#E0EEFF;
  --purple:#5B3FA8;--purple-light:#EEE8FF;
  --border:#E0D8D0;
  --font-display:'Fraunces',serif;--font-ui:'Plus Jakarta Sans',sans-serif;
}
body{font-family:var(--font-ui);background:var(--bg);color:var(--dark);min-height:100vh}
h1,h2,h3{font-family:var(--font-display)}
button{font-family:var(--font-ui);cursor:pointer;border:none;outline:none;background:none}
input,select{font-family:var(--font-ui)}
input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--dark)}
.login-card{background:var(--card);border-radius:16px;padding:40px;width:100%;max-width:400px}
.login-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.login-logo{width:44px;height:44px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#EEE;display:flex;align-items:center;justify-content:center;font-size:20px}
.login-logo img{width:100%;height:100%;object-fit:cover}
.login-rest-name{font-family:var(--font-display);font-size:22px;font-weight:700}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;margin-left:56px;margin-top:4px}
.login-title{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:6px}
.login-hint{font-size:14px;color:var(--muted);margin-bottom:24px}
.field-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block}
.field{width:100%;padding:12px 14px;font-size:15px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);margin-bottom:14px}
.field:focus{border-color:var(--accent);outline:none}
.btn-login{width:100%;padding:14px;background:var(--dark);color:#fff;border-radius:10px;font-size:16px;font-weight:600}
.btn-login:hover{background:#3a2010}
.btn-login:disabled{opacity:.4;cursor:not-allowed}
.error-msg{color:var(--red);font-size:13px;margin-bottom:12px}
.login-brand{font-size:11px;color:var(--muted);text-align:center;margin-top:24px;display:flex;align-items:center;justify-content:center;gap:6px}
.es-badge{width:18px;height:18px;background:#00D4E0;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#000;flex-shrink:0}

/* Topbar */
.topbar{background:var(--dark);padding:12px 0;position:sticky;top:0;z-index:100}
.topbar-inner{max-width:780px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-rest-logo{width:32px;height:32px;border-radius:6px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-rest-logo img{width:100%;height:100%;object-fit:cover}
.topbar-rest-name{font-family:var(--font-display);font-size:17px;font-weight:700;color:#fff}
.topbar-user{font-size:12px;color:rgba(255,255,255,.5)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.accepting-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border-radius:20px;padding:5px 12px 5px 8px;border:1px solid rgba(255,255,255,.15)}
.accepting-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.accepting-dot.on{background:#2ECC8B}
.accepting-dot.off{background:#F0A030}
.accepting-label{font-size:12px;font-weight:600;color:#fff}
.toggle-sm{position:relative;display:inline-block;width:36px;height:20px}
.toggle-sm input{display:none}
.slider-sm{position:absolute;inset:0;background:#555;border-radius:10px;transition:.2s;cursor:pointer}
.slider-sm::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-sm input:checked+.slider-sm{background:#2ECC8B}
.toggle-sm input:checked+.slider-sm::before{transform:translateX(16px)}
.logout-btn{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.15)}
.logout-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.topbar-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.topbar-badge.red{background:var(--red)}

/* Tabs */
.tabs{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:90}
.tabs-inner{max-width:780px;margin:0 auto;padding:0 16px;display:flex}
.tab{padding:14px 20px;font-size:14px;font-weight:600;color:var(--muted);position:relative;display:flex;align-items:center;gap:6px}
.tab.active{color:var(--accent)}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
.tab-count{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%}

.wrap{max-width:780px;margin:0 auto;padding:20px 16px 60px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.section-label.alert{color:var(--red)}
.section-gap{margin-top:32px}

/* Order cards */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.order-card.pending        {border-left:3px solid var(--amber)}
.order-card.accepted       {border-left:3px solid var(--green)}
.order-card.preparing      {border-left:3px solid var(--blue)}
.order-card.ready          {border-left:3px solid var(--purple)}
.order-card.collected      {border-left:3px solid #CCC;opacity:.7}
.order-card.declined       {border-left:3px solid var(--red);opacity:.6}
.order-card.cancel-req     {border-left:3px solid var(--red);background:#FFFAF8}
.order-card.cancelled      {border-left:3px solid #CCC;opacity:.65}
.order-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.order-id{font-weight:700;font-size:16px}
.order-meta{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5}
.status-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;letter-spacing:.04em;flex-shrink:0;white-space:nowrap}
.b-pending    {background:var(--amber-light);color:var(--amber)}
.b-accepted   {background:var(--green-light);color:var(--green)}
.b-preparing  {background:var(--blue-light); color:var(--blue)}
.b-ready      {background:var(--purple-light);color:var(--purple)}
.b-collected  {background:#F0F0F0;color:#666}
.b-declined   {background:var(--red-light);color:var(--red)}
.b-cancel-req {background:#FFE8D8;color:#C84000}
.b-cancelled  {background:#EEEEEE;color:#666}
.order-type-pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.04em;margin-right:6px}
.pill-dine{background:#EEF4FF;color:#3B5FC0}
.pill-take{background:#FFF3E0;color:#B06000}
.order-items{font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.8}
.order-items strong{color:var(--dark);font-weight:600}
.order-total-line{font-size:13px;font-weight:600;margin-top:-6px;margin-bottom:14px}
.order-times{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.7}
.order-times strong{color:var(--dark);font-weight:600}
.cancel-alert{background:var(--red-light);border:1px solid #F0B0B0;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;color:var(--red);margin-bottom:12px}

.actions{display:flex;gap:8px;flex-wrap:wrap}
.abtn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;border:1.5px solid transparent;transition:all .12s}
.abtn-accept  {background:var(--green-light);color:var(--green);border-color:#9ED4B6}
.abtn-accept:hover  {background:#c8ebda}
.abtn-decline {background:var(--red-light);color:var(--red);border-color:#F0B0B0}
.abtn-decline:hover {background:#fad5d5}
.abtn-prepare {background:var(--blue-light);color:var(--blue);border-color:#A0C4F4}
.abtn-prepare:hover {background:#c6ddfa}
.abtn-ready   {background:var(--purple-light);color:var(--purple);border-color:#C0AFF4}
.abtn-ready:hover   {background:#ddd4ff}
.abtn-collect {background:var(--green-light);color:var(--green);border-color:#9ED4B6}
.abtn-collect:hover {background:#c8ebda}
.abtn-approve {background:var(--green-light);color:var(--green);border-color:#9ED4B6}
.abtn-approve:hover {background:#c8ebda}
.abtn-deny    {background:var(--blue-light);color:var(--blue);border-color:#A0C4F4}
.abtn-deny:hover    {background:#c6ddfa}
.abtn-cancel  {background:none;color:var(--muted);border-color:var(--border)}
.abtn-cancel:hover  {background:var(--red-light);color:var(--red);border-color:#F0B0B0}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.7}

/* Stats */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.stat-num{font-family:var(--font-display);font-size:26px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}

/* Menu tab */
.menu-item-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.mi-emoji{font-size:24px;width:36px;text-align:center;flex-shrink:0}
.mi-info{flex:1}
.mi-name{font-weight:600;font-size:14px}
.mi-sub{font-size:13px;color:var(--muted);margin-top:1px}
.avail-label{font-size:11px;font-weight:700;margin-right:8px}
.avail-on{color:var(--green)}
.avail-off{color:var(--muted)}
.toggle{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.toggle input{display:none}
.slider{position:absolute;inset:0;background:#D0C8C0;border-radius:12px;transition:.2s;cursor:pointer}
.slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--green)}
.toggle input:checked+.slider::before{transform:translateX(18px)}
.del-btn{color:#C8A898;font-size:16px;padding:4px 8px;flex-shrink:0}
.del-btn:hover{color:var(--red)}
.add-form{background:var(--card);border:1.5px dashed var(--border);border-radius:12px;padding:20px;margin-top:24px}
.add-form-title{font-weight:600;font-size:14px;color:var(--muted);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.finput{width:100%;padding:10px 12px;font-size:14px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg)}
.finput:focus{border-color:var(--accent);outline:none}
.add-btn{background:var(--accent);color:#fff;padding:10px;border-radius:8px;font-size:14px;font-weight:600;width:100%}
.add-btn:hover{background:var(--accent-dark)}
.add-btn:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;
const API = 'https://queuebite.pythonanywhere.com';

const rid = new URLSearchParams(window.location.search).get('r');

const authFetch = (path, opts={}, token=null) => {
  const headers = {'Content-Type': 'application/json'};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  return fetch(API+path, {
    headers, ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  }).then(r => r.json());
};

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true,day:'numeric',month:'short'});
}

// ── Audio ─────────────────────────────────────────────
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, delay, dur) {
  try {
    const ctx = getCtx(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const t = ctx.currentTime + delay;
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  } catch(e) {}
}
function playNewOrder()  { playTone(440,0,0.12); playTone(660,0.20,0.16); }
function playCancelReq() { playTone(550,0,0.15); playTone(380,0.22,0.15); playTone(220,0.44,0.25); }

// ── Status maps ───────────────────────────────────────
const STATUS_BADGE = {
  pending:'b-pending', accepted:'b-accepted', preparing:'b-preparing',
  ready:'b-ready', collected:'b-collected', declined:'b-declined',
  cancel_requested:'b-cancel-req', cancelled:'b-cancelled',
};
const STATUS_LABEL = {
  pending:'Pending', accepted:'Accepted', preparing:'Preparing',
  ready:'Ready to Collect', collected:'Collected', declined:'Declined',
  cancel_requested:'Cancel Requested', cancelled:'Cancelled',
};

// ── App ───────────────────────────────────────────────
function App() {
  const [screen, setScreen]         = useState('loading');
  const [restInfo, setRestInfo]     = useState(null);
  const [token, setToken]           = useState(sessionStorage.getItem(`vt_${rid}`));
  const [role, setRole]             = useState(sessionStorage.getItem(`vr_${rid}`));
  const [staffName, setStaffName]   = useState(sessionStorage.getItem(`vn_${rid}`));
  const [tab, setTab]               = useState('orders');
  const [orders, setOrders]         = useState([]);
  const [menu, setMenu]             = useState([]);
  const [accepting, setAccepting]   = useState(false);
  const [soundsEnabled, setSoundsEnabled] = useState(false);
  const soundsRef     = useRef(false);
  const prevOrdersRef = useRef(null);

  // Redirect if no restaurant ID
  useEffect(() => {
    if (!rid) { setScreen('no-id'); return; }
    // Load restaurant info
    authFetch(`/r/${rid}/info`).then(info => {
      if (info.error) { setScreen('not-found'); return; }
      setRestInfo(info);
      setAccepting(info.acceptingOrders);
      if (!token) { setScreen('login'); return; }
      // Validate existing session
      authFetch(`/v/${rid}/session`, {}, token).then(s => {
        if (s.error) { clearSession(); setScreen('login'); return; }
        setScreen('app');
      });
    });
  }, []);

  const clearSession = () => {
    sessionStorage.removeItem(`vt_${rid}`);
    sessionStorage.removeItem(`vr_${rid}`);
    sessionStorage.removeItem(`vn_${rid}`);
    setToken(null); setRole(null); setStaffName(null);
  };

  const handleLogin = (tok, r, name) => {
    sessionStorage.setItem(`vt_${rid}`, tok);
    sessionStorage.setItem(`vr_${rid}`, r);
    sessionStorage.setItem(`vn_${rid}`, name);
    setToken(tok); setRole(r); setStaffName(name);
    setScreen('app');
  };

  const handleLogout = () => {
    authFetch(`/v/${rid}/logout`, {method:'POST'}, token);
    clearSession();
    setScreen('login');
  };

  // Logout on tab close
  useEffect(() => {
    if (!token) return;
    const onUnload = () => {
      fetch(API + `/v/${rid}/logout`, {
        method: 'POST',
        headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'},
        body: JSON.stringify({}),
        keepalive: true,
      });
    };
    window.addEventListener('beforeunload', onUnload);
    return () => window.removeEventListener('beforeunload', onUnload);
  }, [token]);

  const loadOrders = () => {
    authFetch(`/r/${rid}/orders`, {}, token).then(data => {
      const newOrders = Array.isArray(data) ? data : [];
      if (soundsRef.current && prevOrdersRef.current !== null) {
        const prevIds = new Set(prevOrdersRef.current.map(o => o.id));
        const prevStatuses = new Map(prevOrdersRef.current.map(o => [o.id, o.status]));
        if (newOrders.some(o => !prevIds.has(o.id) && o.status === 'pending')) playNewOrder();
        if (newOrders.some(o => o.status === 'cancel_requested' && prevStatuses.get(o.id) !== 'cancel_requested')) playCancelReq();
      }
      prevOrdersRef.current = newOrders;
      setOrders(newOrders);
    }).catch(()=>{});
  };

  const loadMenu = () => authFetch(`/r/${rid}/menu`).then(d => setMenu(Array.isArray(d)?d:[])).catch(()=>{});

  useEffect(() => {
    if (screen !== 'app') return;
    loadOrders();
    const t = setInterval(loadOrders, 10000);
    return () => clearInterval(t);
  }, [screen, token]);

  useEffect(() => { if (screen === 'app') loadMenu(); }, [screen, tab]);

  // Poll restaurant info for accepting status changes
  useEffect(() => {
    if (screen !== 'app') return;
    const t = setInterval(() => {
      authFetch(`/r/${rid}/info`).then(info => { if (!info.error) setAccepting(info.acceptingOrders); });
    }, 10000);
    return () => clearInterval(t);
  }, [screen]);

  const toggleAccepting = async () => {
    const next = !accepting;
    const res = await authFetch(`/r/${rid}/accepting`, {method:'PATCH', body:{accepting:next}}, token);
    if (res.ok) setAccepting(next);
  };

  const toggleSounds = () => {
    const next = !soundsRef.current;
    soundsRef.current = next;
    setSoundsEnabled(next);
    if (next) playNewOrder();
  };

  const updateStatus = async (id, status, extra={}) => {
    const raw = id.replace('#','');
    await authFetch(`/r/${rid}/orders/${raw}`, {method:'PATCH', body:{status,...extra}}, token);
    loadOrders();
  };

  const toggleMenu   = async (item) => { await authFetch(`/r/${rid}/menu/${item.id}`, {method:'PATCH', body:{available:!item.available}}, token); loadMenu(); };
  const deleteMenuItem = async (item) => { await authFetch(`/r/${rid}/menu/${item.id}`, {method:'DELETE'}, token); loadMenu(); };
  const addMenuItem  = async (item)  => { await authFetch(`/r/${rid}/menu`, {method:'POST', body:item}, token); loadMenu(); };

  const pendingCount   = orders.filter(o => o.status==='pending').length;
  const cancelReqCount = orders.filter(o => o.status==='cancel_requested').length;
  const alertCount     = pendingCount + cancelReqCount;
  const activeCount    = orders.filter(o => ['accepted','preparing','ready'].includes(o.status)).length;
  const completedCount = orders.filter(o => ['collected','declined','cancelled'].includes(o.status)).length;

  if (screen === 'loading') return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'var(--muted)'}}>Loading…</div>;
  if (screen === 'no-id')   return <ErrorScreen msg="No restaurant ID in URL. Use vendor.html?r=RESTAURANT_ID"/>;
  if (screen === 'not-found') return <ErrorScreen msg="Restaurant not found."/>;
  if (screen === 'login')   return <LoginScreen restInfo={restInfo} onLogin={handleLogin}/>;

  return (
    <div>
      <div className="topbar">
        <div className="topbar-inner">
          <div className="topbar-left">
            <div className="topbar-rest-logo">
              {restInfo?.logoUrl ? <img src={`${API}${restInfo.logoUrl}`} alt="logo"/> : '🍽️'}
            </div>
            <div>
              <div className="topbar-rest-name">{restInfo?.name}</div>
              <div className="topbar-user">{staffName} · {role}</div>
            </div>
          </div>
          <div className="topbar-right">
            {cancelReqCount > 0 && <span className="topbar-badge red">⚠ {cancelReqCount}</span>}
            {pendingCount > 0 && <span className="topbar-badge">{pendingCount} new</span>}
            {role === 'manager' && (
              <div className="accepting-pill" title="Toggle order acceptance">
                <div className={`accepting-dot ${accepting?'on':'off'}`}/>
                <span className="accepting-label">{accepting ? 'Open' : 'Paused'}</span>
                <label className="toggle-sm" style={{marginLeft:4}}>
                  <input type="checkbox" checked={accepting} onChange={toggleAccepting}/>
                  <span className="slider-sm"></span>
                </label>
              </div>
            )}
            <button style={{background:'rgba(255,255,255,.12)',color:soundsEnabled?'#fff':'rgba(255,255,255,.6)',padding:'6px 10px',borderRadius:8,fontSize:12,fontWeight:600,border:'1px solid rgba(255,255,255,.2)'}} onClick={toggleSounds}>
              {soundsEnabled ? '🔔' : '🔕'}
            </button>
            <button className="logout-btn" onClick={handleLogout}>Logout</button>
          </div>
        </div>
      </div>

      <div className="tabs">
        <div className="tabs-inner">
          <button className={`tab${tab==='orders'?' active':''}`} onClick={()=>setTab('orders')}>
            Orders {alertCount>0 && <span className="tab-count">{alertCount}</span>}
          </button>
          {role === 'manager' && (
            <button className={`tab${tab==='menu'?' active':''}`} onClick={()=>setTab('menu')}>Menu</button>
          )}
        </div>
      </div>

      {tab === 'orders'
        ? <OrdersTab orders={orders} onUpdateStatus={updateStatus} pendingCount={pendingCount} activeCount={activeCount} completedCount={completedCount} cancelReqCount={cancelReqCount}/>
        : <MenuTab menu={menu} onToggle={toggleMenu} onDelete={deleteMenuItem} onAdd={addMenuItem}/>
      }
    </div>
  );
}

// ── Login screen ──────────────────────────────────────
function LoginScreen({restInfo, onLogin}) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);

  const submit = async () => {
    setLoading(true); setError('');
    const res = await authFetch(`/v/${rid}/login`, {method:'POST', body:{username, password}});
    if (res.token) onLogin(res.token, res.role, res.name);
    else { setError(res.error || 'Login failed'); setLoading(false); }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-header">
          <div className="login-logo">
            {restInfo?.logoUrl ? <img src={`${API}${restInfo.logoUrl}`} alt="logo"/> : '🍽️'}
          </div>
          <div className="login-rest-name">{restInfo?.name || 'QueueBite'}</div>
        </div>
        <div className="login-sub">Kitchen Panel</div>
        <h2 className="login-title">Staff Login</h2>
        <p className="login-hint">Enter your credentials to continue.</p>
        {error && <div className="error-msg">{error}</div>}
        <label className="field-label">Username</label>
        <input className="field" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} autoFocus/>
        <label className="field-label">Password</label>
        <input className="field" type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!loading&&submit()}/>
        <button className="btn-login" onClick={submit} disabled={loading||!username||!password}>
          {loading ? 'Signing in…' : 'Sign In'}
        </button>
        <div className="login-brand">
          <div className="es-badge">Es</div>
          QueueBite by EasyServe
        </div>
      </div>
    </div>
  );
}

function ErrorScreen({msg}) {
  return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'var(--muted)',textAlign:'center',padding:24}}><div><div style={{fontSize:40,marginBottom:12}}>⚠️</div><p>{msg}</p></div></div>;
}

// ── Orders tab ────────────────────────────────────────
function OrdersTab({orders, onUpdateStatus, pendingCount, activeCount, completedCount, cancelReqCount}) {
  const needsAttention = orders.filter(o => o.status === 'cancel_requested');
  const pending        = orders.filter(o => o.status === 'pending');
  const active         = orders.filter(o => ['accepted','preparing','ready'].includes(o.status));
  const completed      = orders.filter(o => ['collected','declined','cancelled'].includes(o.status));

  return (
    <div className="wrap">
      <div className="stats-bar">
        <div className="stat-card"><div className="stat-num" style={{color:'var(--amber)'}}>{pendingCount}</div><div className="stat-lbl">Pending</div></div>
        <div className="stat-card"><div className="stat-num" style={{color:'var(--blue)'}}>{activeCount}</div><div className="stat-lbl">Active</div></div>
        <div className="stat-card"><div className="stat-num" style={{color:'var(--green)'}}>{completedCount}</div><div className="stat-lbl">Completed</div></div>
        <div className="stat-card"><div className="stat-num" style={{color:'var(--dark)'}}>{orders.length}</div><div className="stat-lbl">Total</div></div>
      </div>
      {orders.length === 0 && <div className="empty-state"><div className="empty-icon">🔔</div><p>No orders yet.<br/>Customer orders appear here automatically.</p></div>}
      {needsAttention.length > 0 && <><div className="section-label alert">⚠ Needs Attention ({needsAttention.length})</div>{needsAttention.map(o=><OrderCard key={o.id} order={o} onUpdateStatus={onUpdateStatus}/>)}</>}
      {pending.length > 0 && <div className={needsAttention.length?'section-gap':''}><div className="section-label">Incoming ({pending.length})</div>{pending.map(o=><OrderCard key={o.id} order={o} onUpdateStatus={onUpdateStatus}/>)}</div>}
      {active.length  > 0 && <div className={(needsAttention.length||pending.length)?'section-gap':''}><div className="section-label">Active ({active.length})</div>{active.map(o=><OrderCard key={o.id} order={o} onUpdateStatus={onUpdateStatus}/>)}</div>}
      {completed.length > 0 && <div className={(needsAttention.length||pending.length||active.length)?'section-gap':''}><div className="section-label">Completed</div>{completed.map(o=><OrderCard key={o.id} order={o} onUpdateStatus={onUpdateStatus}/>)}</div>}
    </div>
  );
}

function OrderCard({order, onUpdateStatus}) {
  const badge     = STATUS_BADGE[order.status] || 'b-pending';
  const label     = STATUS_LABEL[order.status] || order.status;
  const cardClass = order.status === 'cancel_requested' ? 'cancel-req' : order.status;
  const isCancelReq    = order.status === 'cancel_requested';
  const canVendorCancel = ['accepted','preparing','ready'].includes(order.status);

  return (
    <div className={`order-card ${cardClass}`}>
      <div className="order-top">
        <div>
          <span className="order-id">{order.id}</span>
          <div className="order-meta"><strong style={{color:'var(--dark)'}}>{order.customerName}</strong> · +91 {order.phone}</div>
          <div className="order-meta" style={{marginTop:2}}>
            <span className={`order-type-pill ${order.orderType==='dine-in'?'pill-dine':'pill-take'}`}>{order.orderType==='dine-in'?'Dine In':'Takeaway'}</span>
          </div>
        </div>
        <span className={`status-badge ${badge}`}>{label}</span>
      </div>
      {isCancelReq && <div className="cancel-alert">⚠ Customer has requested cancellation</div>}
      <div className="order-items">{order.items.map((it,i)=><span key={i}><strong>{it.qty}×</strong> {it.name}{i<order.items.length-1?', ':''}</span>)}</div>
      <div className="order-total-line">Total: ₹{order.total}</div>
      <div className="order-times">
        <div>Placed: <strong>{fmt(order.placedTs)}</strong></div>
        {order.collectedTs && <div>Collected: <strong>{fmt(order.collectedTs)}</strong></div>}
        {order.cancelledTs && <div>Cancelled: <strong>{fmt(order.cancelledTs)}</strong></div>}
      </div>
      <div className="actions">
        {order.status==='pending' && <><button className="abtn abtn-accept" onClick={()=>onUpdateStatus(order.id,'accepted')}>✓ Accept</button><button className="abtn abtn-decline" onClick={()=>onUpdateStatus(order.id,'declined')}>✕ Decline</button></>}
        {order.status==='accepted'  && <button className="abtn abtn-prepare" onClick={()=>onUpdateStatus(order.id,'preparing')}>🔥 Mark Preparing</button>}
        {order.status==='preparing' && <button className="abtn abtn-ready"   onClick={()=>onUpdateStatus(order.id,'ready')}>🔔 Ready to Collect</button>}
        {order.status==='ready'     && <button className="abtn abtn-collect" onClick={()=>onUpdateStatus(order.id,'collected')}>✓ Mark Collected</button>}
        {isCancelReq && <><button className="abtn abtn-approve" onClick={()=>onUpdateStatus(order.id,'cancelled',{cancelledBy:'vendor_approved'})}>✓ Approve Cancel</button><button className="abtn abtn-deny" onClick={()=>onUpdateStatus(order.id,order.cancelRequestedFrom||'preparing',{cancelRequestedFrom:null})}>✕ Deny, Resume</button></>}
        {canVendorCancel && <button className="abtn abtn-cancel" onClick={()=>{if(window.confirm(`Cancel order ${order.id}?`))onUpdateStatus(order.id,'cancelled',{cancelledBy:'vendor'})}}>✕ Cancel Order</button>}
      </div>
    </div>
  );
}

// ── Menu tab ──────────────────────────────────────────
function MenuTab({menu, onToggle, onDelete, onAdd}) {
  const [form, setForm] = useState({name:'',price:'',category:'',emoji:'🍽️'});
  const cats = [...new Set(menu.map(m=>m.category))];

  const handleAdd = () => {
    if (!form.name.trim()||!form.price||!form.category.trim()) return;
    onAdd({name:form.name.trim(),price:Number(form.price),category:form.category.trim(),emoji:form.emoji||'🍽️'});
    setForm({name:'',price:'',category:'',emoji:'🍽️'});
  };

  return (
    <div className="wrap">
      {cats.map(cat=>(
        <div key={cat} style={{marginBottom:8}}>
          <div className="section-label">{cat}</div>
          {menu.filter(m=>m.category===cat).map(item=>(
            <div key={item.id} className="menu-item-row">
              <span className="mi-emoji">{item.emoji}</span>
              <div className="mi-info"><div className="mi-name">{item.name}</div><div className="mi-sub">₹{item.price}</div></div>
              <span className={`avail-label ${item.available?'avail-on':'avail-off'}`}>{item.available?'Available':'Off'}</span>
              <label className="toggle"><input type="checkbox" checked={item.available} onChange={()=>onToggle(item)}/><span className="slider"></span></label>
              <button className="del-btn" onClick={()=>{if(window.confirm(`Remove "${item.name}"?`))onDelete(item)}}>✕</button>
            </div>
          ))}
        </div>
      ))}
      <div className="add-form">
        <div className="add-form-title">Add new item</div>
        <div className="form-grid">
          <input className="finput" placeholder="Item name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
          <input className="finput" placeholder="Price (₹)" type="number" value={form.price} onChange={e=>setForm({...form,price:e.target.value})}/>
        </div>
        <div className="form-grid">
          <input className="finput" placeholder="Category" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}/>
          <input className="finput" placeholder="Emoji (e.g. 🍛)" value={form.emoji} onChange={e=>setForm({...form,emoji:e.target.value})}/>
        </div>
        <button className="add-btn" onClick={handleAdd} disabled={!form.name.trim()||!form.price||!form.category.trim()}>Add to Menu</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
