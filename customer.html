<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FBF4EC;--card:#FFFFFF;--dark:#1C0F06;--muted:#8A7060;
  --accent:#C85D14;--accent-light:#F5E8DC;--accent-dark:#9E4710;
  --green:#1E6E3A;--green-light:#E4F2EA;
  --red:#B52222;--red-light:#FCEAEA;
  --amber:#B07A10;--amber-light:#FEF3DC;
  --blue:#1A5CA8;--blue-light:#E0EEFF;
  --border:#E8DDD3;
  --font-display:'Fraunces',serif;--font-ui:'Plus Jakarta Sans',sans-serif;
}
body{font-family:var(--font-ui);background:var(--bg);color:var(--dark);min-height:100vh}
h1,h2,h3{font-family:var(--font-display)}
button{font-family:var(--font-ui);cursor:pointer;border:none;outline:none;background:none}
input,select{font-family:var(--font-ui)}
input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px}

.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:13px 0;position:sticky;top:0;z-index:100}
.topbar-inner{max-width:680px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-left{display:flex;align-items:center;gap:10px}
.rest-logo{width:36px;height:36px;border-radius:8px;overflow:hidden;background:#EEE;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rest-logo img{width:100%;height:100%;object-fit:cover}
.topbar-name{font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--dark)}
.topbar-user{font-size:13px;color:var(--muted);font-weight:500}
.back-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--muted)}
.back-btn:hover{background:var(--bg)}

.wrap{max-width:680px;margin:0 auto;padding:0 16px}
.page{padding:24px 0 100px}

/* Brand footer */
.brand-footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px}
.es-badge{width:18px;height:18px;background:#00D4E0;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#000;flex-shrink:0}

/* Full-screen states */
.full-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.full-icon{font-size:56px;margin-bottom:20px}
.full-title{font-family:var(--font-display);font-size:28px;font-weight:700;margin-bottom:10px}
.full-sub{color:var(--muted);font-size:15px;line-height:1.6;max-width:360px}

/* Center screens */
.center-screen{min-height:88vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;text-align:center}
.screen-logo{font-family:var(--font-display);font-size:42px;font-weight:700;color:var(--accent);margin-bottom:6px}
.screen-logo em{font-style:italic;color:var(--dark)}
.screen-sub{color:var(--muted);font-size:15px;margin-bottom:36px}
.screen-title{font-family:var(--font-display);font-size:28px;font-weight:700;margin-bottom:8px}
.screen-hint{color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.6}
.field{width:100%;max-width:360px;padding:13px 16px;font-size:16px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);display:block;margin-bottom:12px}
.field:focus{border-color:var(--accent);outline:none}
.btn-primary{width:100%;max-width:360px;padding:14px;background:var(--accent);color:#fff;border-radius:10px;font-size:16px;font-weight:600}
.btn-primary:hover{background:var(--accent-dark)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.error-msg{color:var(--red);font-size:13px;margin-top:10px;max-width:360px}

/* Dashboard */
.section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.new-order-btn{background:var(--dark);color:#fff;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:600;margin-bottom:28px}
.new-order-btn:hover{background:#3a2010}

/* Active order card */
.active-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
.active-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.order-id{font-weight:700;font-size:16px}
.order-meta{font-size:13px;color:var(--muted);margin-top:3px}
.order-type-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.04em;flex-shrink:0}
.pill-dine{background:#EEF4FF;color:#3B5FC0}
.pill-take{background:#FFF3E0;color:#B06000}
.status-track{margin-bottom:18px}
.status-steps{display:flex;align-items:center;gap:0;margin-bottom:8px}
.step-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg);flex-shrink:0;transition:all .3s}
.step-dot.done{background:var(--green);border-color:var(--green)}
.step-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.step-line{flex:1;height:2px;background:var(--border);transition:background .3s}
.step-line.done{background:var(--green)}
.status-message{font-size:15px;font-weight:600;padding:10px 14px;border-radius:8px;text-align:center;margin-bottom:12px}
.order-items-preview{font-size:13px;color:var(--muted);line-height:1.7}
.declined-card{background:var(--red-light);border:1.5px solid #F0B0B0;border-radius:14px;padding:20px;margin-bottom:14px}
.cancel-link{color:var(--muted);font-size:12px;text-decoration:underline;margin-top:14px;padding:0;display:block;text-align:center}
.cancel-link:hover{color:var(--red)}
.confirm-box{background:var(--red-light);border:1px solid #F0B0B0;border-radius:10px;padding:14px;margin-top:14px}
.confirm-box p{font-size:13px;color:var(--dark);margin-bottom:10px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.confirm-yes{flex:1;background:var(--red);color:#fff;padding:9px;border-radius:8px;font-size:13px;font-weight:600}
.confirm-yes:hover{background:#8B1818}
.confirm-no{flex:1;border:1px solid var(--border);color:var(--muted);padding:9px;border-radius:8px;font-size:13px;font-weight:600}
.confirm-no:hover{border-color:var(--muted)}
.cancel-req-msg{background:var(--amber-light);border:1px solid #E0C070;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--amber);text-align:center;margin-top:14px}

.past-order{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.past-order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.past-id{font-weight:700;font-size:14px}
.past-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.s-collected{background:var(--green-light);color:var(--green)}
.s-declined{background:var(--red-light);color:var(--red)}
.s-cancelled{background:#EEEEEE;color:#666}
.past-items{font-size:13px;color:var(--muted);margin-bottom:8px;line-height:1.6}
.past-times{display:flex;gap:16px;flex-wrap:wrap}
.time-row{font-size:12px;color:var(--muted)}
.time-row strong{color:var(--dark);font-weight:600}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}

.add-btn{background:var(--accent);color:#fff;padding:8px 18px;border-radius:8px;font-size:14px;font-weight:600}
.add-btn:hover{background:var(--accent-dark)}

.counter-note{font-size:13px;color:var(--muted);text-align:center;margin-top:14px}
