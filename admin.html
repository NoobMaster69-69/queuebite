<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueueBite Admin — EasyServe</title>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;--surface:#161B27;--card:#1E2433;--border:#2A3050;
  --cyan:#00D4E0;--cyan-dim:rgba(0,212,224,.12);--cyan-mid:rgba(0,212,224,.25);
  --text:#E8EAF6;--muted:#6B7394;--danger:#E05252;--danger-dim:rgba(224,82,82,.12);
  --green:#2ECC8B;--green-dim:rgba(46,204,139,.12);
  --amber:#F0A030;--amber-dim:rgba(240,160,48,.12);
  --font:'Plus Jakarta Sans',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font)}
input:focus,select:focus{outline:2px solid var(--cyan);outline-offset:1px}
a{color:var(--cyan);text-decoration:none}

/* Layout */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.es-icon{width:32px;height:32px;background:var(--cyan);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;color:var(--text)}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-nav-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:1px solid transparent;transition:.12s}
.topbar-nav-btn:hover{color:var(--text);border-color:var(--border)}
.topbar-nav-btn.active{color:var(--cyan);border-color:var(--cyan-mid)}

.main{max-width:960px;margin:0 auto;padding:32px 24px}

/* Auth screens */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.auth-logo-icon{width:44px;height:44px;background:var(--cyan);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000}
.auth-logo-text{font-size:22px;font-weight:700}
.auth-logo-text span{color:var(--cyan)}
.auth-title{font-size:20px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.field-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;display:block}
.field{width:100%;padding:11px 14px;font-size:14px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);margin-bottom:14px}
.field:focus{border-color:var(--cyan);outline:none}
.btn-primary{width:100%;padding:13px;background:var(--cyan);color:#000;border-radius:8px;font-size:15px;font-weight:700}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.error-msg{color:var(--danger);font-size:13px;margin-bottom:12px}
.success-msg{color:var(--green);font-size:13px;margin-bottom:12px}

/* Page sections */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-size:22px;font-weight:700}
.page-sub{font-size:14px;color:var(--muted);margin-top:4px}
.btn-create{background:var(--cyan);color:#000;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700}
.btn-create:hover{opacity:.9}

/* Restaurant cards */
.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.rest-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:.15s}
.rest-card:hover{border-color:var(--cyan);background:var(--card)}
.rest-card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.rest-logo{width:48px;height:48px;border-radius:10px;background:var(--card);border:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.rest-logo img{width:100%;height:100%;object-fit:cover}
.rest-name{font-weight:700;font-size:16px;margin-bottom:4px}
.rest-id{font-size:12px;color:var(--muted);font-family:monospace}
.rest-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em}
.badge-active{background:var(--green-dim);color:var(--green)}
.badge-inactive{background:var(--danger-dim);color:var(--danger)}
.badge-open{background:var(--cyan-dim);color:var(--cyan)}
.badge-closed{background:var(--amber-dim);color:var(--amber)}
.rest-meta{font-size:12px;color:var(--muted);margin-top:10px}

/* Detail view */
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;font-weight:500;margin-bottom:24px;background:none;border:none;cursor:pointer}
.back-btn:hover{color:var(--text)}
.detail-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:32px;flex-wrap:wrap}
.detail-logo{width:80px;height:80px;border-radius:14px;background:var(--card);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.detail-logo img{width:100%;height:100%;object-fit:cover}
.detail-info{flex:1}
.detail-name{font-size:24px;font-weight:700;margin-bottom:6px}
.detail-id{font-size:13px;color:var(--muted);font-family:monospace;margin-bottom:10px}

.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.section-title{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text)}
.inline-form{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.inline-form .field{margin-bottom:0;flex:1;min-width:160px}
.btn-sm{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600}
.btn-cyan{background:var(--cyan);color:#000}
.btn-cyan:hover{opacity:.9}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--text);color:var(--text)}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid transparent}
.btn-danger:hover{border-color:var(--danger)}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid transparent}
.btn-success:hover{border-color:var(--green)}

/* Staff table */
.staff-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.staff-row:last-child{border-bottom:none}
.staff-name{flex:1;font-weight:600;font-size:14px}
.staff-meta{font-size:12px;color:var(--muted)}
.role-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px}
.role-manager{background:var(--cyan-dim);color:var(--cyan)}
.role-staff{background:var(--border);color:var(--muted)}

/* QR section */
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:10px 0}
#qr-container canvas, #qr-container img{border-radius:8px}
.qr-url{font-size:12px;color:var(--muted);font-family:monospace;word-break:break-all;text-align:center;max-width:300px}

/* Settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:600px){.settings-grid{grid-template-columns:1fr}}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.toggle-info{flex:1}
.toggle-label{font-weight:600;font-size:14px}
.toggle-sub{font-size:12px;color:var(--muted);margin-top:3px}
.toggle{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.toggle input{display:none}
.slider{position:absolute;inset:0;background:#333;border-radius:12px;transition:.2s;cursor:pointer}
.slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--cyan)}
.toggle input:checked+.slider::before{transform:translateX(18px)}

.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}

.select-field{width:100%;padding:11px 14px;font-size:14px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);margin-bottom:14px}
.select-field:focus{border-color:var(--cyan);outline:none}

.divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
