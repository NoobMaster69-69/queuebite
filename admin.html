<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueueBite Admin — EasyServe</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;--surface:#161B27;--card:#1E2433;--border:#2A3050;
  --cyan:#00D4E0;--cyan-dim:rgba(0,212,224,.12);--cyan-mid:rgba(0,212,224,.25);
  --text:#E8EAF6;--muted:#6B7394;--danger:#E05252;--danger-dim:rgba(224,82,82,.12);
  --green:#2ECC8B;--green-dim:rgba(46,204,139,.12);
  --amber:#F0A030;--amber-dim:rgba(240,160,48,.12);
  --font:'Plus Jakarta Sans',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font)}
input:focus,select:focus{outline:2px solid var(--cyan);outline-offset:1px}
a{color:var(--cyan);text-decoration:none}

/* Layout */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.es-icon{width:32px;height:32px;background:var(--cyan);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;color:var(--text)}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-nav-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:1px solid transparent;transition:.12s}
.topbar-nav-btn:hover{color:var(--text);border-color:var(--border)}
.topbar-nav-btn.active{color:var(--cyan);border-color:var(--cyan-mid)}

.main{max-width:960px;margin:0 auto;padding:32px 24px}

/* Auth screens */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.auth-logo-icon{width:44px;height:44px;background:var(--cyan);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000}
.auth-logo-text{font-size:22px;font-weight:700}
.auth-logo-text span{color:var(--cyan)}
.auth-title{font-size:20px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.field-label{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;display:block}
.field{width:100%;padding:11px 14px;font-size:14px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);margin-bottom:14px}
.field:focus{border-color:var(--cyan);outline:none}
.btn-primary{width:100%;padding:13px;background:var(--cyan);color:#000;border-radius:8px;font-size:15px;font-weight:700}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.error-msg{color:var(--danger);font-size:13px;margin-bottom:12px}
.success-msg{color:var(--green);font-size:13px;margin-bottom:12px}

/* Page sections */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-size:22px;font-weight:700}
.page-sub{font-size:14px;color:var(--muted);margin-top:4px}
.btn-create{background:var(--cyan);color:#000;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700}
.btn-create:hover{opacity:.9}

/* Restaurant cards */
.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.rest-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:.15s}
.rest-card:hover{border-color:var(--cyan);background:var(--card)}
.rest-card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.rest-logo{width:48px;height:48px;border-radius:10px;background:var(--card);border:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.rest-logo img{width:100%;height:100%;object-fit:cover}
.rest-name{font-weight:700;font-size:16px;margin-bottom:4px}
.rest-id{font-size:12px;color:var(--muted);font-family:monospace}
.rest-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em}
.badge-active{background:var(--green-dim);color:var(--green)}
.badge-inactive{background:var(--danger-dim);color:var(--danger)}
.badge-open{background:var(--cyan-dim);color:var(--cyan)}
.badge-closed{background:var(--amber-dim);color:var(--amber)}
.rest-meta{font-size:12px;color:var(--muted);margin-top:10px}

/* Detail view */
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;font-weight:500;margin-bottom:24px;background:none;border:none;cursor:pointer}
.back-btn:hover{color:var(--text)}
.detail-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:32px;flex-wrap:wrap}
.detail-logo{width:80px;height:80px;border-radius:14px;background:var(--card);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.detail-logo img{width:100%;height:100%;object-fit:cover}
.detail-info{flex:1}
.detail-name{font-size:24px;font-weight:700;margin-bottom:6px}
.detail-id{font-size:13px;color:var(--muted);font-family:monospace;margin-bottom:10px}

.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.section-title{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text)}
.inline-form{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.inline-form .field{margin-bottom:0;flex:1;min-width:160px}
.btn-sm{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600}
.btn-cyan{background:var(--cyan);color:#000}
.btn-cyan:hover{opacity:.9}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--text);color:var(--text)}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid transparent}
.btn-danger:hover{border-color:var(--danger)}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid transparent}
.btn-success:hover{border-color:var(--green)}

/* Staff table */
.staff-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.staff-row:last-child{border-bottom:none}
.staff-name{flex:1;font-weight:600;font-size:14px}
.staff-meta{font-size:12px;color:var(--muted)}
.role-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px}
.role-manager{background:var(--cyan-dim);color:var(--cyan)}
.role-staff{background:var(--border);color:var(--muted)}

/* QR section */
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:10px 0}
#qr-container canvas, #qr-container img{border-radius:8px}
.qr-url{font-size:12px;color:var(--muted);font-family:monospace;word-break:break-all;text-align:center;max-width:300px}

/* Settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:600px){.settings-grid{grid-template-columns:1fr}}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.toggle-info{flex:1}
.toggle-label{font-weight:600;font-size:14px}
.toggle-sub{font-size:12px;color:var(--muted);margin-top:3px}
.toggle{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.toggle input{display:none}
.slider{position:absolute;inset:0;background:#333;border-radius:12px;transition:.2s;cursor:pointer}
.slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--cyan)}
.toggle input:checked+.slider::before{transform:translateX(18px)}

.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}

.select-field{width:100%;padding:11px 14px;font-size:14px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);margin-bottom:14px}
.select-field:focus{border-color:var(--cyan);outline:none}

.divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef} = React;
const API = 'https://queuebite.pythonanywhere.com';

const authFetch = (path, opts={}, token=null) => {
  const headers = {'Content-Type': 'application/json'};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  return fetch(API+path, {
    headers,
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  }).then(r => r.json());
};

const uploadFetch = (path, formData, token) =>
  fetch(API+path, {method:'POST', headers:{'Authorization':`Bearer ${token}`}, body: formData}).then(r=>r.json());

function EsIcon({size=28}) {
  return (
    <div style={{width:size,height:size,background:'#00D4E0',borderRadius:size*0.25,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.38,fontWeight:700,color:'#000',flexShrink:0,fontFamily:'sans-serif'}}>
      Es
    </div>
  );
}

// ─── App ──────────────────────────────────────────────
function App() {
  const [view, setView]           = useState('loading');
  const [token, setToken]         = useState(sessionStorage.getItem('adminToken'));
  const [restaurants, setRestaurants] = useState([]);
  const [selected, setSelected]   = useState(null);
  const [frontendUrl, setFrontendUrl] = useState('');

  useEffect(() => {
    authFetch('/admin/status').then(d => {
      if (!d.setup) { setView('setup'); return; }
      if (!token)   { setView('login'); return; }
      authFetch('/admin/config', {}, token).then(cfg => {
        if (cfg.error) { sessionStorage.removeItem('adminToken'); setView('login'); return; }
        setFrontendUrl(cfg.frontendUrl || '');
        loadRestaurants(token);
        setView('dashboard');
      });
    }).catch(() => setView('login'));
  }, []);

  const loadRestaurants = (tok) => {
    authFetch('/admin/restaurants', {}, tok).then(d => {
      if (Array.isArray(d)) setRestaurants(d);
    });
  };

  const handleLogin = (tok) => {
    sessionStorage.setItem('adminToken', tok);
    setToken(tok);
    authFetch('/admin/config', {}, tok).then(cfg => {
      setFrontendUrl(cfg.frontendUrl || '');
      loadRestaurants(tok);
      setView('dashboard');
    });
  };

  const handleLogout = () => {
    authFetch('/admin/logout', {method:'POST'}, token);
    sessionStorage.removeItem('adminToken');
    setToken(null);
    setView('login');
  };

  const handleSelectRestaurant = (r) => { setSelected(r); setView('restaurant'); };
  const handleBack = () => { setSelected(null); setView('dashboard'); loadRestaurants(token); };

  if (view === 'loading')    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'#6B7394'}}>Loading…</div>;
  if (view === 'setup')      return <SetupScreen onDone={() => setView('login')} />;
  if (view === 'login')      return <LoginScreen onLogin={handleLogin} />;
  if (view === 'settings')   return <SettingsScreen token={token} frontendUrl={frontendUrl} onFrontendUrlChange={setFrontendUrl} onBack={()=>setView('dashboard')} />;
  if (view === 'restaurant') return (
    <RestaurantDetail
      restaurant={selected}
      token={token}
      frontendUrl={frontendUrl}
      onBack={handleBack}
      onUpdate={r => setSelected(r)}
    />
  );

  return (
    <div>
      <div className="topbar">
        <div className="topbar-brand">
          <EsIcon size={32}/>
          <div>
            <div className="topbar-title">QueueBite Admin</div>
            <div className="topbar-sub">by EasyServe</div>
          </div>
        </div>
        <div className="topbar-right">
          <button className={`topbar-nav-btn${view==='dashboard'?' active':''}`} onClick={()=>setView('dashboard')}>Restaurants</button>
          <button className={`topbar-nav-btn${view==='settings'?' active':''}`}  onClick={()=>setView('settings')}>Settings</button>
          <button className="topbar-nav-btn" onClick={handleLogout}>Logout</button>
        </div>
      </div>
      <div className="main">
        <Dashboard
          restaurants={restaurants}
          token={token}
          onSelect={handleSelectRestaurant}
          onCreated={() => loadRestaurants(token)}
        />
      </div>
    </div>
  );
}

// ─── Setup ────────────────────────────────────────────
function SetupScreen({onDone}) {
  const [password, setPassword]     = useState('');
  const [confirm, setConfirm]       = useState('');
  const [frontendUrl, setFrontendUrl] = useState('');
  const [error, setError]           = useState('');
  const [loading, setLoading]       = useState(false);

  const submit = async () => {
    if (password !== confirm) { setError('Passwords do not match'); return; }
    if (password.length < 6)  { setError('Password must be at least 6 characters'); return; }
    setLoading(true);
    const res = await authFetch('/admin/setup', {method:'POST', body:{password, frontendUrl}});
    if (res.ok) onDone();
    else setError(res.error || 'Setup failed');
    setLoading(false);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <EsIcon size={44}/>
          <div><div className="auth-logo-text">Queue<span>Bite</span></div><div style={{fontSize:12,color:'var(--muted)'}}>by EasyServe</div></div>
        </div>
        <h2 className="auth-title">First-time Setup</h2>
        <p className="auth-sub">Set your admin password and configure the platform.</p>
        {error && <div className="error-msg">{error}</div>}
        <label className="field-label">Admin Password</label>
        <input className="field" type="password" placeholder="Min. 6 characters" value={password} onChange={e=>setPassword(e.target.value)}/>
        <label className="field-label">Confirm Password</label>
        <input className="field" type="password" placeholder="Repeat password" value={confirm} onChange={e=>setConfirm(e.target.value)}/>
        <label className="field-label">Frontend URL (for QR codes)</label>
        <input className="field" placeholder="https://yourusername.github.io/queuebite" value={frontendUrl} onChange={e=>setFrontendUrl(e.target.value)}/>
        <p style={{fontSize:12,color:'var(--muted)',marginBottom:16,marginTop:-8}}>The base URL where customer.html and vendor.html are hosted.</p>
        <button className="btn-primary" onClick={submit} disabled={loading||!password||!confirm}>
          {loading ? 'Setting up…' : 'Complete Setup'}
        </button>
      </div>
    </div>
  );
}

// ─── Login ────────────────────────────────────────────
function LoginScreen({onLogin}) {
  const [password, setPassword] = useState('');
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);

  const submit = async () => {
    setLoading(true); setError('');
    const res = await authFetch('/admin/login', {method:'POST', body:{password}});
    if (res.token) onLogin(res.token);
    else { setError(res.error || 'Login failed'); setLoading(false); }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <EsIcon size={44}/>
          <div><div className="auth-logo-text">Queue<span>Bite</span></div><div style={{fontSize:12,color:'var(--muted)'}}>Admin Panel · EasyServe</div></div>
        </div>
        <h2 className="auth-title">Admin Login</h2>
        <p className="auth-sub">Enter your admin password to continue.</p>
        {error && <div className="error-msg">{error}</div>}
        <label className="field-label">Password</label>
        <input className="field" type="password" placeholder="Admin password"
          value={password} onChange={e=>setPassword(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&!loading&&submit()} autoFocus />
        <button className="btn-primary" onClick={submit} disabled={loading||!password}>
          {loading ? 'Signing in…' : 'Sign In'}
        </button>
      </div>
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────
function Dashboard({restaurants, token, onSelect, onCreated}) {
  const [showCreate, setShowCreate] = useState(false);
  const [newName, setNewName]       = useState('');
  const [creating, setCreating]     = useState(false);
  const [error, setError]           = useState('');

  const handleCreate = async () => {
    if (!newName.trim()) return;
    setCreating(true);
    const res = await authFetch('/admin/restaurants', {method:'POST', body:{name:newName.trim()}}, token);
    if (res.id) { onCreated(); setShowCreate(false); setNewName(''); }
    else setError(res.error || 'Failed to create');
    setCreating(false);
  };

  return (
    <>
      <div className="page-header">
        <div>
          <div className="page-title">Restaurants</div>
          <div className="page-sub">{restaurants.length} restaurant{restaurants.length!==1?'s':''} on the platform</div>
        </div>
        <button className="btn-create" onClick={()=>setShowCreate(true)}>+ New Restaurant</button>
      </div>

      {showCreate && (
        <div className="section-card" style={{marginBottom:24}}>
          <div className="section-title">Create New Restaurant</div>
          {error && <div className="error-msg">{error}</div>}
          <div className="inline-form">
            <input className="field" placeholder="Restaurant name" value={newName} onChange={e=>setNewName(e.target.value)} autoFocus onKeyDown={e=>e.key==='Enter'&&handleCreate()}/>
            <button className="btn-sm btn-cyan" onClick={handleCreate} disabled={creating||!newName.trim()}>{creating?'Creating…':'Create'}</button>
            <button className="btn-sm btn-outline" onClick={()=>{setShowCreate(false);setNewName('');setError('');}}>Cancel</button>
          </div>
          <p style={{fontSize:12,color:'var(--muted)',marginTop:10}}>A unique ID will be auto-generated. Default menu will be assigned.</p>
        </div>
      )}

      {restaurants.length === 0
        ? <div className="empty-state"><div className="empty-icon">🏪</div><p>No restaurants yet.<br/>Create one to get started.</p></div>
        : <div className="rest-grid">
            {restaurants.map(r => (
              <div key={r.id} className="rest-card" onClick={()=>onSelect(r)}>
                <div className="rest-card-top">
                  <div className="rest-logo">
                    {r.logoUrl ? <img src={`${API}${r.logoUrl}`} alt="logo"/> : '🍽️'}
                  </div>
                  <div style={{flex:1}}>
                    <div className="rest-name">{r.name}</div>
                    <div className="rest-id">{r.id}</div>
                  </div>
                </div>
                <div className="rest-badges">
                  <span className={`badge ${r.active?'badge-active':'badge-inactive'}`}>{r.active?'Active':'Inactive'}</span>
                  <span className={`badge ${r.acceptingOrders?'badge-open':'badge-closed'}`}>{r.acceptingOrders?'Taking Orders':'Paused'}</span>
                </div>
                <div className="rest-meta">Created {new Date(r.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
              </div>
            ))}
          </div>
      }
    </>
  );
}

// ─── Restaurant Detail ────────────────────────────────
function RestaurantDetail({restaurant, token, frontendUrl, onBack, onUpdate}) {
  const [info, setInfo]         = useState(restaurant);
  const [staff, setStaff]       = useState([]);
  const [editName, setEditName] = useState(restaurant.name);
  const [msg, setMsg]           = useState('');
  const [msgType, setMsgType]   = useState('');
  const qrRef = useRef(null);
  const qrInstance = useRef(null);

  const customerUrl = `${frontendUrl}/customer.html?r=${info.id}`;
  const vendorUrl   = `${frontendUrl}/vendor.html?r=${info.id}`;

  useEffect(() => { loadStaff(); }, []);
  useEffect(() => {
    if (qrRef.current && frontendUrl) {
      qrRef.current.innerHTML = '';
      qrInstance.current = new QRCode(qrRef.current, {text: customerUrl, width:200, height:200, colorDark:'#000000', colorLight:'#FFFFFF'});
    }
  }, [frontendUrl, info.id]);

  const loadStaff = () => {
    authFetch(`/admin/restaurants/${info.id}/staff`, {}, token).then(d => {
      if (Array.isArray(d)) setStaff(d);
    });
  };

  const flash = (text, type='success') => { setMsg(text); setMsgType(type); setTimeout(()=>setMsg(''), 3000); };

  const saveName = async () => {
    const res = await authFetch(`/admin/restaurants/${info.id}`, {method:'PATCH', body:{name:editName.trim()}}, token);
    if (res.id) { setInfo(res); onUpdate(res); flash('Name updated'); }
    else flash(res.error || 'Failed', 'error');
  };

  const toggleActive = async () => {
    const res = await authFetch(`/admin/restaurants/${info.id}`, {method:'PATCH', body:{active:!info.active}}, token);
    if (res.id) { setInfo(res); onUpdate(res); flash(`Restaurant ${res.active?'activated':'deactivated'}`); }
  };

  const uploadLogo = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('logo', file);
    const res = await uploadFetch(`/admin/restaurants/${info.id}/logo`, fd, token);
    if (res.ok) {
      const updated = {...info, logoUrl: res.logoUrl + '?t=' + Date.now()};
      setInfo(updated); onUpdate(updated); flash('Logo uploaded');
    } else flash(res.error || 'Upload failed', 'error');
  };

  const downloadQR = () => {
    const canvas = qrRef.current?.querySelector('canvas');
    if (!canvas) return;
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `${info.id}-qr.png`;
    a.click();
  };

  return (
    <>
      <button className="back-btn" onClick={onBack}>← Back to Restaurants</button>

      {msg && <div className={msg && msgType==='error' ? 'error-msg' : 'success-msg'} style={{marginBottom:16}}>{msg}</div>}

      <div className="detail-header">
        <div className="detail-logo">
          {info.logoUrl ? <img src={`${API}${info.logoUrl}`} alt="logo" key={info.logoUrl}/> : '🍽️'}
        </div>
        <div className="detail-info">
          <div className="detail-name">{info.name}</div>
          <div className="detail-id">ID: {info.id}</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <span className={`badge ${info.active?'badge-active':'badge-inactive'}`}>{info.active?'Active':'Inactive'}</span>
            <span className={`badge ${info.acceptingOrders?'badge-open':'badge-closed'}`}>{info.acceptingOrders?'Taking Orders':'Paused'}</span>
          </div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>

        {/* Left column */}
        <div>
          {/* Edit name */}
          <div className="section-card">
            <div className="section-title">Restaurant Name</div>
            <div className="inline-form">
              <input className="field" value={editName} onChange={e=>setEditName(e.target.value)}/>
              <button className="btn-sm btn-cyan" onClick={saveName} disabled={!editName.trim()}>Save</button>
            </div>
          </div>

          {/* Logo */}
          <div className="section-card">
            <div className="section-title">Logo</div>
            <p style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Shown to customers and vendors. JPG, PNG or WebP.</p>
            <label style={{display:'inline-block',padding:'9px 16px',background:'var(--cyan)',color:'#000',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer'}}>
              Upload Logo
              <input type="file" accept="image/jpeg,image/png,image/webp" style={{display:'none'}} onChange={uploadLogo}/>
            </label>
          </div>

          {/* Active toggle */}
          <div className="section-card">
            <div className="section-title">Restaurant Status</div>
            <div className="toggle-row">
              <div className="toggle-info">
                <div className="toggle-label">{info.active ? 'Active' : 'Deactivated'}</div>
                <div className="toggle-sub">{info.active ? 'Customers can access this restaurant.' : 'Customers see a "closed" screen.'}</div>
              </div>
              <label className="toggle">
                <input type="checkbox" checked={info.active} onChange={toggleActive}/>
                <span className="slider"></span>
              </label>
            </div>
          </div>
        </div>

        {/* Right column */}
        <div>
          {/* QR Code */}
          <div className="section-card">
            <div className="section-title">Customer QR Code</div>
            {frontendUrl
              ? <>
                  <div className="qr-wrap">
                    <div ref={qrRef} style={{background:'#fff',padding:12,borderRadius:8}}/>
                    <div className="qr-url">{customerUrl}</div>
                  </div>
                  <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
                    <button className="btn-sm btn-cyan" onClick={downloadQR}>Download PNG</button>
                    <button className="btn-sm btn-outline" onClick={()=>navigator.clipboard.writeText(customerUrl)}>Copy Customer URL</button>
                    <button className="btn-sm btn-outline" onClick={()=>navigator.clipboard.writeText(vendorUrl)}>Copy Vendor URL</button>
                  </div>
                </>
              : <p style={{fontSize:13,color:'var(--muted)'}}>Set your Frontend URL in Settings to generate QR codes.</p>
            }
          </div>
        </div>
      </div>

      {/* Staff */}
      <div className="section-card" style={{marginTop:0}}>
        <div className="section-title">Staff Accounts</div>
        <AddStaffForm restaurantId={info.id} token={token} onAdded={loadStaff}/>
        <div className="divider"/>
        {staff.length === 0
          ? <p style={{fontSize:13,color:'var(--muted)',textAlign:'center',padding:'16px 0'}}>No staff yet.</p>
          : staff.map(m => <StaffRow key={m.username} member={m} restaurantId={info.id} token={token} onChanged={loadStaff}/>)
        }
      </div>
    </>
  );
}

function AddStaffForm({restaurantId, token, onAdded}) {
  const [form, setForm] = useState({username:'', name:'', password:'', role:'staff'});
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    setLoading(true); setError('');
    const res = await authFetch(`/admin/restaurants/${restaurantId}/staff`, {method:'POST', body:form}, token);
    if (res.username) { onAdded(); setForm({username:'', name:'', password:'', role:'staff'}); }
    else setError(res.error || 'Failed');
    setLoading(false);
  };

  return (
    <div style={{marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:600,color:'var(--muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:'.05em'}}>Add Staff Member</div>
      {error && <div className="error-msg">{error}</div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
        <input className="field" style={{marginBottom:0}} placeholder="Username" value={form.username} onChange={e=>setForm({...form,username:e.target.value})}/>
        <input className="field" style={{marginBottom:0}} placeholder="Display name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
        <input className="field" style={{marginBottom:0}} type="password" placeholder="Password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>
        <select className="select-field" style={{marginBottom:0}} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
          <option value="staff">Staff — Orders only</option>
          <option value="manager">Manager — Full access</option>
        </select>
      </div>
      <button className="btn-sm btn-cyan" onClick={submit} disabled={loading||!form.username||!form.password}>
        {loading ? 'Adding…' : 'Add Staff Member'}
      </button>
    </div>
  );
}

function StaffRow({member, restaurantId, token, onChanged}) {
  const [resetting, setResetting] = useState(false);
  const [newPwd, setNewPwd]       = useState('');
  const [showReset, setShowReset] = useState(false);

  const remove = async () => {
    if (!window.confirm(`Remove ${member.name}?`)) return;
    await authFetch(`/admin/restaurants/${restaurantId}/staff/${member.username}`, {method:'DELETE'}, token);
    onChanged();
  };

  const resetPwd = async () => {
    if (!newPwd.trim() || newPwd.length < 4) return;
    setResetting(true);
    await authFetch(`/admin/restaurants/${restaurantId}/staff/${member.username}/password`, {method:'PATCH', body:{password:newPwd}}, token);
    setNewPwd(''); setShowReset(false); setResetting(false);
  };

  return (
    <div>
      <div className="staff-row">
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span className="staff-name">{member.name}</span>
            <span className={`role-badge ${member.role==='manager'?'role-manager':'role-staff'}`}>{member.role}</span>
          </div>
          <div className="staff-meta">@{member.username}</div>
        </div>
        <button className="btn-sm btn-outline" style={{marginRight:6}} onClick={()=>setShowReset(!showReset)}>Reset Password</button>
        <button className="btn-sm btn-danger" onClick={remove}>Remove</button>
      </div>
      {showReset && (
        <div style={{display:'flex',gap:8,padding:'8px 0 4px',borderBottom:'1px solid var(--border)'}}>
          <input className="field" style={{marginBottom:0,flex:1}} type="password" placeholder="New password" value={newPwd} onChange={e=>setNewPwd(e.target.value)}/>
          <button className="btn-sm btn-cyan" onClick={resetPwd} disabled={resetting||newPwd.length<4}>{resetting?'Saving…':'Save'}</button>
          <button className="btn-sm btn-outline" onClick={()=>setShowReset(false)}>Cancel</button>
        </div>
      )}
    </div>
  );
}

// ─── Settings ─────────────────────────────────────────
function SettingsScreen({token, frontendUrl, onFrontendUrlChange, onBack}) {
  const [url, setUrl]           = useState(frontendUrl);
  const [curPwd, setCurPwd]     = useState('');
  const [newPwd, setNewPwd]     = useState('');
  const [confirmPwd, setConfirmPwd] = useState('');
  const [msg, setMsg]           = useState('');
  const [msgType, setMsgType]   = useState('');

  const flash = (text, type='success') => { setMsg(text); setMsgType(type); setTimeout(()=>setMsg(''), 3000); };

  const saveUrl = async () => {
    const res = await authFetch('/admin/config', {method:'PATCH', body:{frontendUrl:url}}, token);
    if (res.ok) { onFrontendUrlChange(url); flash('Frontend URL updated'); }
    else flash(res.error || 'Failed', 'error');
  };

  const changePassword = async () => {
    if (newPwd !== confirmPwd) { flash('Passwords do not match', 'error'); return; }
    if (newPwd.length < 6)     { flash('Password must be at least 6 characters', 'error'); return; }
    const res = await authFetch('/admin/password', {method:'PATCH', body:{currentPassword:curPwd, newPassword:newPwd}}, token);
    if (res.ok) { flash('Password changed'); setCurPwd(''); setNewPwd(''); setConfirmPwd(''); }
    else flash(res.error || 'Failed', 'error');
  };

  return (
    <>
      <button className="back-btn" onClick={onBack}>← Back to Restaurants</button>
      <div className="page-header" style={{marginBottom:24}}>
        <div><div className="page-title">Settings</div></div>
      </div>
      {msg && <div className={msgType==='error'?'error-msg':'success-msg'} style={{marginBottom:16}}>{msg}</div>}
      <div className="settings-grid">
        <div className="section-card">
          <div className="section-title">Frontend URL</div>
          <p style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Base URL where your HTML files are hosted. Used for QR code generation.</p>
          <input className="field" placeholder="https://username.github.io/queuebite" value={url} onChange={e=>setUrl(e.target.value)}/>
          <button className="btn-sm btn-cyan" onClick={saveUrl}>Save URL</button>
        </div>
        <div className="section-card">
          <div className="section-title">Change Admin Password</div>
          <input className="field" type="password" placeholder="Current password" value={curPwd} onChange={e=>setCurPwd(e.target.value)}/>
          <input className="field" type="password" placeholder="New password" value={newPwd} onChange={e=>setNewPwd(e.target.value)}/>
          <input className="field" type="password" placeholder="Confirm new password" value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)}/>
          <button className="btn-sm btn-cyan" onClick={changePassword} disabled={!curPwd||!newPwd||!confirmPwd}>Change Password</button>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
